services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: dota2_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: "INFO"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: dota2_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - USE_MOCK_EMBEDDER=true
      # --- ДОБАВЛЕННЫЕ СТРОКИ НИЖЕ ---
      - QDRANT_PREFER_GRPC=true   # Включаем быстрый бинарный протокол
      - BATCH_SIZE=1000           # Уменьшаем размер пачки с 5000 до 1000
      - QDRANT_TIMEOUT=120.0      # Даем базе 2 минуты на ответ вместо 30 секунд
    volumes:
      - .:/app
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_storage:
    driver: local