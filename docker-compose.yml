services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dota2_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: "INFO"
    # Штатного надёжного healthcheck-инструмента в образе qdrant/qdrant нет
    # (curl/wget сознательно убраны, см. github.com/qdrant/qdrant/issues/4250
    # и /issues/3491 — открытые issue без официального решения). Проверка
    # готовности перенесена в src/api/main.py (retry на старте FastAPI).

  api:
    build: .
    container_name: dota2_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - USE_MOCK_EMBEDDER=true
      - QDRANT_PREFER_GRPC=true
      - BATCH_SIZE=1000
      - QDRANT_TIMEOUT=120.0
    depends_on:
      qdrant:
        condition: service_started   # было: service_healthy

volumes:
  qdrant_storage:
    driver: local
